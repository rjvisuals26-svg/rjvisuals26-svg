<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient Theme -->
    <radialGradient id="bg-glow" cx="40%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#181135" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#05030d"/>
    </radialGradient>
    <linearGradient id="neon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff"/>
      <stop offset="50%" stop-color="#d6a4ff"/>
      <stop offset="100%" stop-color="#ff2a74"/>
    </linearGradient>
    <linearGradient id="glass-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="platform-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2a74" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#b026ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Visual Glow Filters -->
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pink-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="platform-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;family=Inter:wght@400;600;700;800&amp;family=Oooh+Baby&amp;display=swap');
      
      .font-sans { font-family: 'Inter', system-ui, sans-serif; }
      .font-mono { font-family: 'Fira Code', monospace; }
      .font-cute { font-family: 'Oooh Baby', cursive, sans-serif; }
      
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .cursor { animation: blink 1s infinite; fill: #00f3ff; }

      @keyframes pulse-heart {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 12px #ff2a74); }
      }
      .cute-heart { 
        animation: pulse-heart 3s ease-in-out infinite; 
        transform-origin: 370px 125px; 
      }

      @keyframes float-char {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-14px); }
      }
      .floating-char { animation: float-char 4.5s ease-in-out infinite; }

      @keyframes platform-pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.06); }
      }
      .platform { animation: platform-pulse 4.5s ease-in-out infinite; transform-origin: 1060px 660px; }
    </style>
  </defs>

  <!-- Canvas Background -->
  <rect width="1280" height="800" fill="#05030d"/>
  <rect width="1280" height="800" fill="url(#bg-glow)"/>

  <!-- Subtle Ambient Grid Texture -->
  <g opacity="0.015" stroke="#ffffff" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="1280" height="800" fill="url(#grid)"/>
  </g>

  <!-- ================= HEADER REGION (LEFT SIDE) ================= -->
  <g transform="translate(60, 80)">
    <text class="font-mono" font-size="16" fill="#ff2a74" opacity="0.9">rukhsar@dev:<tspan fill="#00f3ff">~</tspan><tspan fill="#ffffff">$ cat README.md</tspan></text>
    <rect x="252" y="-14" width="10" height="18" fill="#9d9aa8" opacity="0.5"/>
    
    <text class="font-sans" font-size="20" font-weight="600" fill="#ffffff" y="45">Hi there! 👋 I'm</text>
    
    <!-- Premium Cursive Script Typography for Name -->
    <text class="font-cute" font-size="64" font-weight="700" fill="#ff2a74" y="115" filter="url(#pink-glow)">Rukhsar Jabeen</text>
    
    <!-- Decorative Pulsing Neon Heart -->
    <path class="cute-heart" fill="#ff2a74" d="M12,5 C8.5,1 2,1 2,6 C2,10 6,14 12,19 C18,14 22,10 22,6 C22,1 L15.5,1 L12,5 Z" transform="translate(370, 78) scale(1.2)"/>

    <text class="font-sans" font-size="13" font-weight="700" fill="#b026ff" y="155" letter-spacing="2.5">FRONTEND DEVELOPER &amp; UI/UX ENTHUSIAST</text>
    <line x1="0" y1="175" x2="415" y2="175" stroke="#1f1a3a" stroke-width="1.5"/>
  </g>

  <!-- ================= INTERACTIVE CODE WINDOW (MIDDLE-TOP) ================= -->
  <g transform="translate(500, 60)">
    <rect width="360" height="340" rx="16" fill="#0b0818" fill-opacity="0.85" stroke="url(#glass-edge)" stroke-width="1.5" filter="url(#subtle-glow)"/>
    <rect width="360" height="38" rx="16" fill="#110d24"/>
    <rect width="360" height="16" y="22" fill="#110d24"/>
    <line x1="0" y1="38" x2="360" y2="38" stroke="url(#glass-edge)"/>
    
    <!-- Window Control OS Dots -->
    <circle cx="22" cy="19" r="5.5" fill="#ff5f56"/>
    <circle cx="38" cy="19" r="5.5" fill="#ffbd2e"/>
    <circle cx="54" cy="19" r="5.5" fill="#27c93f"/>
    <text class="font-mono" font-size="12" fill="#7d7993" x="180" y="23" text-anchor="middle">about.jsx</text>

    <!-- JSON Config Data Stack -->
    <g transform="translate(25, 72)" class="font-mono" font-size="13" font-weight="500" letter-spacing="0.2">
      <text fill="#ff2a74">const <tspan fill="#00f3ff">me</tspan> <tspan fill="#ffffff">=</tspan> <tspan fill="#ffffff">{</tspan></text>
      <text y="24" x="15" fill="#b026ff">name: <tspan fill="#ff9f43">"Rukhsar Jabeen"</tspan>,</text>
      <text y="48" x="15" fill="#b026ff">role: <tspan fill="#ff9f43">"Frontend Developer"</tspan>,</text>
      <text y="72" x="15" fill="#b026ff">focus: <tspan fill="#ffffff">[</tspan><tspan fill="#00f3ff">"Web"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#00f3ff">"UI/UX"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#00f3ff">"Frontend"</tspan><tspan fill="#ffffff">],</tspan></text>
      <text y="96" x="15" fill="#b026ff">passion: <tspan fill="#ff9f43">"Building beautiful things"</tspan>,</text>
      <text y="120" x="15" fill="#b026ff">designAesthetic: <tspan fill="#ff9f43">"Soft, pink, &amp; clean"</tspan>,</text>
      <text y="144" x="15" fill="#b026ff">currentlyLearning: <tspan fill="#ff9f43">"Full-Stack &amp; AI"</tspan>,</text>
      <text y="168" x="15" fill="#b026ff">funFact: <tspan fill="#ff9f43">"I love coding at night 🌙"</tspan></text>
      <text y="192" fill="#ffffff">};</text>
      
      <text y="228" fill="#6d6a78" font-style="italic">// Code is my art, logic is my superpower.</text>
    </g>
  </g>

  <!-- ================= STRIP COMMENT BLOCK (LEFT-MIDDLE) ================= -->
  <g transform="translate(60, 275)">
    <rect width="415" height="75" rx="12" fill="#0d091f" fill-opacity="0.6" stroke="url(#glass-edge)" stroke-width="1"/>
    <!-- Quotation Vector Mark -->
    <text class="font-sans" font-size="44" font-weight="800" fill="#ff2a74" opacity="0.3" x="15" y="45">“</text>
    <text class="font-sans" font-size="14" font-weight="600" fill="#9d9aa8" x="42" y="32" text-rendering="geometricPrecision">I build responsive, user-friendly and impactful</text>
    <text class="font-sans" font-size="14" font-weight="600" fill="#9d9aa8" x="42" y="54" text-rendering="geometricPrecision">web experiences.</text>
    <circle cx="395" cy="55" r="4" fill="#ff2a74"/>
  </g>

  <!-- ================= 12-PILL TECH STACK AREA ================= -->
  <g transform="translate(60, 395)">
    <text class="font-mono" font-size="13" font-weight="600" fill="#00f3ff" letter-spacing="1">&lt;/&gt; TECH STACK</text>
    
    <!-- Row 1 -->
    <g transform="translate(0, 22)">
      <rect width="85" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#ff9f43" x="42.5" y="20" text-anchor="middle">HTML5</text>
    </g>
    <g transform="translate(95, 22)">
      <rect width="75" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#00f3ff" x="37.5" y="20" text-anchor="middle">CSS3</text>
    </g>
    <g transform="translate(180, 22)">
      <rect width="110" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#ffbd2e" x="55" y="20" text-anchor="middle">JavaScript</text>
    </g>
    <g transform="translate(300, 22)">
      <rect width="95" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#00f3ff" x="47.5" y="20" text-anchor="middle">React.js</text>
    </g>
    <g transform="translate(405, 22)">
      <rect width="90" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#ff2a74" x="45" y="20" text-anchor="middle">Firebase</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 66)">
      <rect width="65" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#ffffff" opacity="0.8" x="32.5" y="20" text-anchor="middle">C++</text>
    </g>
    <g transform="translate(75, 66)">
      <rect width="65" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#00e676" x="32.5" y="20" text-anchor="middle">SQL</text>
    </g>
    <g transform="translate(150, 66)">
      <rect width="75" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#b026ff" x="37.5" y="20" text-anchor="middle">Figma</text>
    </g>
    <g transform="translate(235, 66)">
      <rect width="85" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#00f3ff" x="42.5" y="20" text-anchor="middle">Netlify</text>
    </g>
    <g transform="translate(330, 66)">
      <rect width="105" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#ff9f43" x="52.5" y="20" text-anchor="middle">REST APIs</text>
    </g>
    <g transform="translate(445, 66)">
      <rect width="115" height="32" rx="10" fill="#120e29" stroke="url(#glass-edge)" stroke-width="1"/>
      <text class="font-sans" font-size="13" font-weight="600" fill="#d6a4ff" x="57.5" y="20" text-anchor="middle">Git &amp; GitHub</text>
    </g>
  </g>

  <!-- ================= ABOUT ME MINI PORTAL GRID ================= -->
  <g transform="translate(60, 535)">
    <rect width="450" height="195" rx="16" fill="#080615" fill-opacity="0.7" stroke="url(#glass-edge)" stroke-width="1"/>
    <text class="font-sans" font-size="13" font-weight="700" fill="#ff2a74" x="20" y="30" letter-spacing="1">💕 ABOUT ME</text>
    
    <g transform="translate(20, 58)" class="font-sans" font-size="13" font-weight="600" fill="#ffffff" opacity="0.85">
      <text y="0">🌸 Passionate about crafting clean, modern &amp; user-focused interfaces.</text>
      <text y="28">🎯 Focused on Frontend Development &amp; UI/UX Systems.</text>
      <text y="56">📚 Currently exploring Full-Stack Architectures &amp; AI Frameworks.</text>
      <text y="84">✨ Always learning, coding, and turning fresh ideas into realities.</text>
    </g>
  </g>

  <!-- ================= GITHUB STATS MINI DASHBOARD ================= -->
  <g transform="translate(530, 425)">
    <rect width="330" height="165" rx="16" fill="#080615" fill-opacity="0.7" stroke="url(#glass-edge)" stroke-width="1"/>
    <text class="font-sans" font-size="12" font-weight="700" fill="#b026ff" x="20" y="26" letter-spacing="1">📊 SYSTEM STATS</text>
    
    <!-- Stars -->
    <g transform="translate(30, 55)">
      <text class="font-sans" font-size="22" font-weight="800" fill="#ffffff" x="25" y="25" text-anchor="middle">50+</text>
      <text class="font-mono" font-size="11" font-weight="600" fill="#6d6a78" x="25" y="48" text-anchor="middle">Stars</text>
    </g>
    <!-- Repos -->
    <g transform="translate(100, 55)">
      <text class="font-sans" font-size="22" font-weight="800" fill="#00f3ff" x="25" y="25" text-anchor="middle">25+</text>
      <text class="font-mono" font-size="11" font-weight="600" fill="#6d6a78" x="25" y="48" text-anchor="middle">Repos</text>
    </g>
    <!-- Commits -->
    <g transform="translate(170, 55)">
      <text class="font-sans" font-size="22" font-weight="800" fill="#ff2a74" x="30" y="25" text-anchor="middle">500+</text>
      <text class="font-mono" font-size="11" font-weight="600" fill="#6d6a78" x="30" y="48" text-anchor="middle">Commits</text>
    </g>
    <!-- Followers -->
    <g transform="translate(250, 55)">
      <text class="font-sans" font-size="22" font-weight="800" fill="#ffffff" x="25" y="25" text-anchor="middle">30+</text>
      <text class="font-mono" font-size="11" font-weight="600" fill="#6d6a78" x="25" y="48" text-anchor="middle">Followers</text>
    </g>
  </g>

  <!-- ================= TERMINAL FOOTER LOG CLOSURE ================= -->
  <g transform="translate(530, 610)">
    <rect width="330" height="120" rx="14" fill="#090617" fill-opacity="0.9" stroke="url(#glass-edge)" stroke-width="1"/>
    <g transform="translate(20, 32)" class="font-mono" font-size="13">
      <text fill="#ff2a74">rukhsar@dev:<tspan fill="#00f3ff">~</tspan><tspan fill="#ffffff">$ echo "Thanks!"</tspan></text>
      <text y="26" fill="#00e676">Thanks for visiting! 😊</text>
      <text y="52" fill="#b026ff">Happy Coding! 💜 _</text>
      <rect class="cursor" x="126" y="40" width="6" height="14"/>
    </g>
  </g>

  <!-- ================= RIGHT SIDE: DYNAMIC PLACED CHARACTER PLATFORM ================= -->
  <!-- Repositioned into the clear right-hand column (x 870-1250) so it no longer
       overlaps the stats/footer cards or bleeds past the canvas edge, given a
       grounding glow "platform", and set gently floating/animated. -->
  <ellipse class="platform" cx="1060" cy="660" rx="160" ry="28" fill="url(#platform-glow)" filter="url(#platform-blur)"/>

  <g class="floating-char">
    <image href="https://i.ibb.co/1tfz0ttV/Adobe-Express-file.png"
           x="870" y="260" width="380" height="380" preserveAspectRatio="xMidYMidMeet"/>
  </g>

  <!-- Top Right Embedded Accent Frame Graphic Header -->
  <g transform="translate(1015, 60)" filter="url(#subtle-glow)">
    <rect width="200" height="65" rx="12" fill="#0c071d" fill-opacity="0.8" stroke="#ff2a74" stroke-width="1.5"/>
    <text class="font-mono" font-size="11" font-weight="600" fill="#9d9aa8" x="100" y="28" text-anchor="middle" letter-spacing="1.5">&lt;/&gt; KEEP CODING</text>
    <text class="font-mono" font-size="11" font-weight="600" fill="#b026ff" x="100" y="46" text-anchor="middle" letter-spacing="1.5">KEEP GROWING</text>
  </g>

  <!-- Outer Neon Synth Frame Borders Wrapper -->
  <rect x="25" y="25" width="1230" height="750" rx="24" fill="none" stroke="url(#neon-gradient)" stroke-width="2" opacity="0.25"/>
</svg>
