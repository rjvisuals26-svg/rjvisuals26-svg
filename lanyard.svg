<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="100%" height="100%">
  <defs>
    <!-- Glassmorphism & Neon Gradients -->
    <linearGradient id="lanyard-strap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2a74"/>
      <stop offset="50%" stop-color="#ff65a3"/>
      <stop offset="100%" stop-color="#b026ff"/>
    </linearGradient>
    
    <linearGradient id="badge-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#130e26" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#070412" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="glass-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="holo-sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00f3ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#ff2a74" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="avatar-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow & Shadow Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feOffset dx="0" dy="15" result="offset"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Typography Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;600&amp;family=Inter:wght@400;700;800&amp;display=swap');
      .txt-sans { font-family: 'Inter', system-ui, sans-serif; }
      .txt-mono { font-family: 'Fira Code', monospace; }
    </style>
  </defs>

  <!-- ================= PENDULUM SWING CONTAINER ================= -->
  <!-- Origin centered at top pin point (250, -50) to facilitate physics sway -->
  <g filter="url(#shadow)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      values="-4 250 -50; 4 250 -50; -4 250 -50" 
      dur="5s" 
      repeatCount="indefinite" 
      calcMode="spline" 
      keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
    />

    <!-- 1. The Lanyard Strap Loop -->
    <path d="M 225,-50 L 242,210 L 258,210 L 275,-50 Z" fill="url(#lanyard-strap)" opacity="0.9"/>
    <circle cx="250" cy="-50" r="10" fill="#110c22"/>

    <!-- 2. Metallic Badge Clip Rigging Assembly -->
    <rect x="238" y="200" width="24" height="25" rx="4" fill="#3a3550"/>
    <rect x="242" y="205" width="16" height="15" rx="2" fill="#1b172e"/>
    <path d="M 244,225 L 250,238 L 256,225 Z" fill="#3a3550"/>
    <circle cx="250" cy="242" r="5" fill="#00f3ff" filter="url(#neon-glow)"/>

    <!-- ================= MAIN CARD CONTAINER ================= -->
    <g transform="translate(130, 245)">
      <!-- Card Base Plate Background -->
      <rect width="240" height="380" rx="20" fill="url(#badge-body)" stroke="url(#glass-edge)" stroke-width="2"/>
      
      <!-- Top Slot cutout hole -->
      <rect x="100" y="12" width="40" height="8" rx="4" fill="#080511"/>

      <!-- Accent Top Neon Trim -->
      <rect x="15" y="32" width="210" height="4" rx="2" fill="#ff2a74" filter="url(#neon-glow)" opacity="0.8"/>

      <!-- 3. Avatar Identity Area -->
      <circle cx="120" cy="110" r="48" fill="url(#avatar-glow)"/>
      <circle cx="120" cy="110" r="42" fill="none" stroke="#00f3ff" stroke-width="2.5" filter="url(#neon-glow)"/>
      
      <!-- Core Icon Placement (Vector Developer Avatar Shape) -->
      <g transform="translate(90, 80)">
        <clipPath id="avatar-clip">
          <circle cx="30" cy="30" r="38"/>
        </clipPath>
        <g clip-path="url(#avatar-clip)">
          <rect width="60" height="60" fill="#191436"/>
          <circle cx="30" cy="24" r="14" fill="#ff2a74" opacity="0.85"/>
          <path d="M 5,52 C 5,38 15,34 30,34 C 45,34 55,38 55,52 Z" fill="#00f3ff"/>
        </g>
      </g>

      <!-- 4. Text Data Field Specifications -->
      <text class="txt-sans" font-size="20" font-weight="800" fill="#ffffff" x="120" y="185" text-anchor="middle" letter-spacing="0.5">rjvisuals26</text>
      <text class="txt-mono" font-size="11" font-weight="600" fill="#00f3ff" x="120" y="206" text-anchor="middle" letter-spacing="1.5">FULL-STACK ENGINEER</text>

      <!-- Divider Ribbon Line Overlay -->
      <line x1="30" y1="225" x2="210" y2="225" stroke="#1f1a3a" stroke-width="1.5"/>

      <!-- Minor Meta Details Infrastructure Blocks -->
      <g transform="translate(30, 248)" class="txt-sans">
        <text font-size="10" font-weight="700" fill="#5b5770" letter-spacing="0.5">DEPT</text>
        <text font-size="12" font-weight="700" fill="#ffffff" y="16">WEB / APP</text>

        <text font-size="10" font-weight="700" fill="#5b5770" letter-spacing="0.5" x="110">SYS_AUTH</text>
        <text font-size="12" font-weight="700" fill="#00e676" y="16" x="110">GRANTED</text>
      </g>

      <!-- 5. Machine Scannable Barcode Engine Frame Components -->
      <g transform="translate(32, 298)">
        <rect x="0" width="3" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="6" width="6" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="16" width="2" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="21" width="8" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="33" width="4" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="41" width="2" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="47" width="7" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="58" width="3" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="65" width="9" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="78" width="2" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="84" width="5" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="93" width="8" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="105" width="3" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="112" width="6" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="122" width="2" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="128" width="9" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="141" width="4" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="149" width="2" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="155" width="7" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="166" width="3" height="32" fill="#ffffff" opacity="0.8"/>
        <rect x="171" width="5" height="32" fill="#ffffff" opacity="0.8"/>
        <text class="txt-mono" font-size="9" fill="#443f5e" x="88" y="44" text-anchor="middle" letter-spacing="2">0110101001011</text>
      </g>

      <!-- 6. Holographic Sweeping Gloss Overlayer Shield -->
      <rect width="240" height="380" rx="20" fill="url(#holo-sweep)" pointer-events="none">
        <animateTransform 
          attributeName="transform" 
          type="translate" 
          values="-240,-240; 400,400; -240,-240" 
          dur="6s" 
          repeatCount="indefinite"
          calcMode="spline"
          keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
        />
      </rect>
    </g>
  </g>
</svg>
