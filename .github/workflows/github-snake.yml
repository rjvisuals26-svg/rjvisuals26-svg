name: Generate Snake Graph

on:
  schedule:
    # Runs automatically every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Allows you to manually run it anytime
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the snake game animations from rjvisuals26-svg's contribution graph
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#ff2a74&color_dots=#130e26,#221a46,#44338a,#7d5cc6,#b026ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00f3ff&color_dots=#130e26,#162544,#20448a,#326ec6,#00bfff

      # Pushes the generated SVGs to a separate branch called "output" so they stay clean
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
